server {
    listen 80;
    # Replace with your Oracle Cloud Public IP or custom domain
    server_name YOUR_SERVER_IP_OR_DOMAIN;

    # Allow uploads up to 20MB (must match backend multer limits)
    client_max_body_size 20M;

    # Serve the Vite production build
    root /opt/streakforge/frontend/dist;
    index index.html;

    # ── Static file uploads (avatars, note attachments) ──
    # Proxied to Express so files are served from the backend's /uploads/ directory.
    # This is required because Express manages the upload folder, not Nginx directly.
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── REST API requests ──
    # No trailing slash on proxy_pass — preserves the /api/ prefix when forwarding.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── React SPA fallback ──
    # All other paths are served by the React app (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
